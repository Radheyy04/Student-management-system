<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Management System {% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1a2235;
            --border: rgba(255,255,255,0.07);
            --accent: #4fffb0;
            --accent2: #3b82f6;
            --danger: #ff4d6d;
            --text: #e8edf5;
            --muted: #6b7a99;
            --glow: 0 0 30px rgba(79,255,176,0.15);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Atmospheric background */
        body::before {
            content: '';
            position: fixed;
            top: -200px; left: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -200px; right: -100px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(79,255,176,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* NAV */
        nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2.5rem;
            height: 68px;
            background: rgba(10,14,26,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
            color: var(--text);
            text-decoration: none;
            display: flex; align-items: center; gap: 10px;
        }
        .nav-logo span {
            display: inline-block;
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
        }

        .nav-links { display: flex; gap: 0.25rem; }
        .nav-links a {
            padding: 0.45rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--muted);
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-links a:hover { color: var(--text); background: var(--surface2); }
        .nav-links a.active { color: var(--accent); background: rgba(79,255,176,0.08); }

        /* MAIN */
        main {
            position: relative; z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* PAGE HEADER */
        .page-header {
            margin-bottom: 2.5rem;
        }
        .page-header .eyebrow {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        .page-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.1;
        }
        .page-header p {
            color: var(--muted);
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }

        /* CARDS */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.75rem;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: rgba(255,255,255,0.12); }

        /* STAT CHIPS */
        .stats-row {
            display: flex; gap: 1rem; flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .stat-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            flex: 1; min-width: 140px;
        }
        .stat-chip .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-chip .value { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 700; }

        /* BUTTONS */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 0.6rem 1.25rem;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: #0a0e1a;
        }
        .btn-primary:hover { background: #6fffc0; box-shadow: var(--glow); transform: translateY(-1px); }

        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

        .btn-danger {
            background: rgba(255,77,109,0.1);
            color: var(--danger);
            border: 1px solid rgba(255,77,109,0.2);
        }
        .btn-danger:hover { background: rgba(255,77,109,0.2); transform: translateY(-1px); }

        /* TABLE */
        .table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: var(--surface2); }
        thead th {
            padding: 1rem 1.25rem;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }
        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(255,255,255,0.03); }
        tbody td {
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
            vertical-align: middle;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            background: rgba(59,130,246,0.12);
            color: #93c5fd;
            border: 1px solid rgba(59,130,246,0.2);
        }

        /* FORM */
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,255,176,0.1);
        }
        .form-group input::placeholder { color: var(--muted); }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
        .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; }

        /* FLASH */
        .flash { padding: 0.85rem 1.25rem; border-radius: 10px; margin-bottom: 1.5rem; font-size: 0.875rem; font-weight: 500; }
        .flash-success { background: rgba(79,255,176,0.1); color: var(--accent); border: 1px solid rgba(79,255,176,0.2); }
        .flash-error { background: rgba(255,77,109,0.1); color: var(--danger); border: 1px solid rgba(255,77,109,0.2); }

        /* ANIMATIONS */
        @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
        .animate { animation: fadeUp 0.4s ease both; }
        .animate:nth-child(1) { animation-delay: 0s; }
        .animate:nth-child(2) { animation-delay: 0.05s; }
        .animate:nth-child(3) { animation-delay: 0.1s; }
        .animate:nth-child(4) { animation-delay: 0.15s; }

        /* AVATAR */
        .avatar {
            width: 34px; height: 34px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            display: inline-flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.8rem; color: #fff;
            flex-shrink: 0;
        }

        .name-cell { display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">
            <span></span>Student Management System
        </a>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Students</a>
            <a href="/add" class="{% if request.path == '/add' %}active{% endif %}">Add Student</a>
        </div>
    </nav>
    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for cat, msg in messages %}
              <div class="flash flash-{{ cat }}">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
